body:
  text: 妙峰山後學周理輯滇南學人陶珙閲示衆五臺山大顯通寺淨業堂念佛道場圓滿示衆指座云據師子座善師子吼煞有知音虛空點首拈香云此香統天地以同根會萬物而一體金罏乍爇法界蒙熏端為祝延今上皇帝聖躬萬歲萬歲萬萬歲欽願至聖至明如日如月惟福惟壽同地同天又拈香云此香奉答本師臨濟二十三葉古庭大和尚極難忘處初不曾容易道一字惹惡心處末後來老草唱三玄又拈香云此香敬為大吉祥顯通堂上署庵宗主大和尚懺主無方和尚并合堂及本山諸山諸方今日同臻此會江湖龍象師德每惟願惟道同尊惟德同仰若帝網珠垂光範範如玻璃鏡寫影團團在在處處陰翊皇圖光揚佛日垂語云我此臺山無孔鐵鎚當面擲黑漆崑崙攔路阻莫有挨拶得入拈弄得出底麼出來道一句看僧出問如何是臺山境師云不是下雨便是天晴進云如何是境中人師云金剛寶窟萬菩薩進云尋常所談何事師云清風吹幽松近聽聲愈好又僧問如何是佛法的的大意師云今年調雨水農家好春麥僧又問如何是祖師西來意師云飯仙山轉身即向汝道師乃云拈砒霜作醍醐亦曾有也撒珍珠如瓦礫誰箇不然開眼上樹特地喪全身夢升兜率也是揚家醜未動情思轉魔女盡成菩提寶器不勞腕力指娑婆便是妙喜淨邦長水濬嶽積而來琅琊覺水消而去信步踏翻琉璃阱等間擊碎珊瑚枝三聖振威一喝正法眼裏撒沙南泉白刃高揮古佛宗風掃土何必不必探竿子豈在人手湘之潭之塔樣子脫體持來不萌枝上放春回烈焰堆中揚雪片有斯大略可謂其人雖然誰家井底無天到處波心有月體相用三大齊彰塵塵攝入因果智五周頓證法法圓融百城煙水不出一毛十世古今匪移當念紅藕開時水香觸著蟭螟蟲半邊鼻青山低處天闊展開瘦蚊子一莖眉百川競注而水體不流萬竅共吼而風本自寂金師子不妨踞地吼水牯牛隨分納些些動容滿目家山依舊青天白日即日恭喜大吉祥顯通堂上奉敕提督臺山華梵僧徒自在修行僧録左街覺義署庵旺公大和尚起居納福即大聖文殊之影響繼萬鍾欽命之高蹤建茲淨業高堂浩集江湖龍象助宣佛化丕贊宗猷三載熏修今日云滿普諷華嚴之大典津濟水陸之冥陽攜手法界含靈高步同遊嘉會可謂盡善盡美全始全終是以俾我山僧來上此座然一炷香先為祝延聖壽仰答洪庥次為序謝一期同緣大衆因茲記得華嚴經中有箇念佛三昧拈出供養大衆經中道若有如是如是思惟則有如是如是顯現若無如是如是思惟則無如是如是顯現這箇三昧甚有淆訛後來善財童子參見解脫長者廣説念佛法門道我若欲見安樂世界阿彌陀佛隨意即見山僧道若有如是如是思惟則有如是如是顯現在解脫長者得之矣若無如是如是思惟則無如是如是顯現便是解脫長者到此也須茫然是你諸人三年在此松月流輝蓮花滴漏心湛湛口叨叨費盡多少殷勤這箇三昧還透得過麼其或未然曲垂一偈十方龍象總英賢三載熏修不偶然如是思惟渾坐斷五臺峰頂放青蓮示衆云真淨文禪師示衆云頭陀石被莓苔裹擲筆峰遭薜荔纏羅漢院裏一年度三箇行者歸宗寺裏參退喫茶應庵華因僧舉問此理如何華云他是關西子愛説川僧話師云我這裏一年度一箇行者一日喫一鉢白粥也不管五峰頭晴雪抱頂那羅洞晚雲橫谷若有問者是汝諸人不可也道老僧愛説川僧話好冬至示衆云五頂瓊瑤堆千松珠玉枝盡臺山泉石煙雲飛樓湧殿總是文殊師利一隻智眼真光是你諸人常在於其中經行及坐臥還知初不曾動著伊一莖眉毛麼若也與麼見得便爾小大千於毫頭廣塵沙包法界也不為難事其或未然切忌東卜西卜且更聽山僧為你諸人真實告報道今朝冬至一陽生珍重示衆云無著誤入金剛窟曼殊老問南方佛法如何住持著云末法比丘少奉戒律又問多少衆著云或三百或五百師云實頭人難得無著卻問此間佛法如何住持曼殊云凡聖同居龍蛇混雜又問多少衆曼殊云前三三後三三師云實頭人難得山僧與麼稱賞其間還有頭高頭下者麼若人撿點得出許他親見曼殊老示衆云嘗聞老豐干要來五臺禮文殊直至如今不見消息噫日間莫説人好這老漢堂堂來也且你這一隊飯袋子畢竟著那一箇代文殊師利與伊秪對得過老僧幸是傍邊人無事且休去便下座示衆云山高海闊月朗風清松蒼石白夏暑冬寒如是歷歷分明一一成現且衲僧分上成得箇什麼邊事莫有道得者麼不妨出來道看若無老僧自道去也拈拄杖便下座示衆云古德道參禪參到無參處參到無參始徹頭又云參禪參到無參處參到無參未徹頭師云古人固是赤心片片要且自語相違只如參到無參處還容你開口得麼良久云一夜瀟瀟雨滿山松籟寒示衆云江月照松風吹永夜清宵何所為莫可便是已過量無有量大人之境界麼喝一喝云永嘉大師來也莫寐語示衆云松風淡淡溪月溶溶山蒼蒼而不盡水茫茫而無窮伶利漢一坐坐斷便見福城東際底便是普賢毛孔裏底普賢毛孔裏底便是福城東際底如師子兒獨行更誰可為伴侶喝一喝云你是誰家子弟得與麼自由萬福元宵示衆云須彌燈王佛與無量光如來相把手於萬井笙歌叢裡千門燈火光中遊戲一上卻來僧堂裏為汝諸人慶元宵道好個時節因緣是汝諸人還見麼還聞麼若不然則到更深月落燈滅不見色時被伊扭住鼻頭莫道老僧不説來示衆云我曾於教中見外道持一莖草插於地上云此是世界中心世尊移草插於傍云此是世界中心因此會得些子用處當是時不自覺有偈云在天天高在地地厚一莖草上應時應候自後來無往不得大衆且道外道與佛相去多少遂以拂子柄向空插云你等諸人切忌也道是世界中心好示衆云目前無法意在目前他不是目前法非耳目之所到白雲自占青山明月誰分流水示衆云是汝諸人朝三暮四如許多時在這裏會得箇入頭處也未睦州道若未得箇入頭須得箇入頭若得箇入頭不得辜負老僧我道若未得箇入頭須得箇入頭若得箇入頭不得辜負眉毛示衆云長沙岑大師道盡大地草木人畜總是般若真光師乃召云大衆看看老僧上黃鶴樓上去也只見晴川歷歷漢陽樹芳草萋萋鸚鵡洲是你諸人也還見麼喝一喝下座示衆云雲門道扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾妙喜道此是禪悅法喜之樂師云同聲相應在妙喜即不無我不與麼道扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾雲門一上神通不同小小冷地看來也只是一把破扇子示衆云古人道難難難我道也不難賊來須打客來須看熱則到處熱寒時天下寒寒山逢拾得撞著老豐干相喚相呼歸去也珊瑚枝上月團團示衆云香積界中喫飯新羅國裏穿衣且道是甚麼人切忌道是胡張三黑李四參示衆云居一切時不起妄念於諸妄心亦不息滅住妄想境不加了知於無了知不辨真實我要你會你作麼生會直曉你會得七穿八穴也正是好肉上剜瘡示衆云你有拄杖子我與你拄杖子你無拄杖子我奪你拄杖子古人得任麼不惜眉毛且即今誰是知恩者只如雪竇道拄杖子吞乾坤又作麼生師乃驀拈拄杖下座示衆云演祖道有一則奇特因緣舉似諸人欲説又被説礙不説又被不説礙師云大小演祖大似靈龜拽尾一言既落入耳如何又諱得住山僧這裏也有一則奇特因緣索性舉似大方使他依門傍戶者一箇箇壁立千仞也不為分外下座示衆云機分大小教殊半滿我這裏打一鼓則無邊剎境一聞按一指則十世古今一念衆中莫有收拾不盡者麼出來老僧為汝雪屈喝一喝下座示衆云我這裏也不説東村李大郎太儉也不説西社王二姐太奢也不會安角呼兔也不會添足畫蛇早起一碗白粥午後一碗清茶更誰管他陳年爛葛藤冷地開花展兩手云你等諸人來這裏討甚麼乾木查示衆云機先一著搆得著搆不著不免打拆你腳句後承當底且緩緩示衆云不著佛求不著法求不著僧求是甚麼人分上事雖然猶欠掌在示衆云德山木上座臨濟金剛王溈仰一串圓相雲門體露金風洞山吾常於此切法眼曹源一滴水趙州青州布衫重七斤其真參實悟底猶落在第二頭況語脈理尋討者三千里外沒交涉示衆云高坐空寂之床大握無為之化使盡大地草木人畜情與無情一時立地成佛同入涅槃真際初不曾用少心力且道是甚麼人得與麼自在我要與汝諸人將出恐他道我多事下座示衆云演祖道頻呼小玉元無事只要檀郎認得聲若是箇人也須悟去始得這些子事不是你説了便當得底昔佛果老人忽然悟於日下之雞當是時常所謂機智語言還用得著麼比來叢林寥落之甚蓋為希見這般本色之人故耳今既祖禰不了屈為諸人露箇消息去也師乃驀召大衆云頻呼小玉元無事只要檀郎認得聲示衆云古德謂即此見聞非見聞更無聲色可呈君又云即此見聞非見聞勿於聲色乍盲聾師云不歸那畔獨脫今時在古人即不無我今不惜老性命橫身於聲色裏與汝諸人相見去也豎起拂子云這箇是色還見麼卻擊香卓一下云這個是聲還聞麼乃云不因夜來鴈爭見海門秋示衆云趙州道三十年前在南方火爐頭有一則無賓主話直至如今無人舉著師云好一則無賓主話可惜許拈拄杖云莫動著動著三十棒一棒也較不過雖然也是賊過後張弓示衆云石上栽花活不得水中捉月拈不得未為好手我這裏石上栽花春滿寰區水中捉月光含萬象遂以拂子柄向空畫一畫下座示衆云金峰謂金峰三十年前有老婆心三十年後無老婆心僧問如何是三十年前有老婆心峰云問凡答凡問聖答聖如何是三十年後無老婆心峰云問凡不答凡問聖不答聖師云將謂將謂元來元來噫這老金峰教壞人家男女不少衆中莫有為伊救得此過者麼出來道看莫道你道不得道得也依舊可憐生浴佛示衆云遵布衲於藥山會裏浴佛次山云汝只浴得這個且浴不得那個遵云把將那個來山便休去師云又是早晚時也然他家用處固是不同若是我才見道且浴不得那個聲未了舀一杓驀面便潑識者必謂九龍吐水未似今日是説且置即今杓柄子在手不肖兒孫灌沐半偈作麼宣揚一夜落花雨滿城流水香示衆云拈過倚天長劍擲下住山鈯斧使他大地含靈個個成佛作祖可謂大施門開略無險阻只有一個喚不回頭底寧死不肯入這裏許大衆你道是誰推倒無縫塔不打鹽官鼓師一日對衆云今早忽然憶起我天順癸未臘末參見古庭老和尚於浮山一日老和尚問爾從大方不憚遠來所為何事我謂特來巾瓶和尚老和尚云老僧與闍黎甚麼時曾相識來我道將謂和尚忘卻老和尚云即今事作麼生我乃呈偈云叢林處處播春風此日尋師到別峰末後聲前句非句寫在山河大地中老和尚喜而容我入室我後來悔之不及大衆且道悔個甚麼悔不當時見道即今事作麼生攔腮便掌劈面便喝若與麼也未可便不容我入室雖然也是過後見識弘治丙辰二月八日尚膳監太監周請妙應淨業堂示衆祝香云此香體極中和薰陶治業謹爇金爐端為祝延今上皇帝聖躬萬歲萬歲萬萬歲欽願壽同天地道並唐虞千載雍熙萬方賓化又拈香云此香奉為大功德主尚膳監太監周公輔惟願近須彌而同其寶色入滄海而潤其波瀾光贊佛乘永膺天眷問答不録拈拂云拈將黃蘗蒿枝慣打鹽官大鼓相逢不識誰敢當機揮德山棒倒嶽傾湫肆臨濟喝轟雷掣電寫出虛空鳥迹直穿水底月痕移淨瓶推枕子從上爪牙茶去採藥來宗門格調誰問他廬陵米價且脫去鶻臭布衫飽齁齁無證無修赤骨律有憑有據枯木巖前立雪不萌枝上拈花搜空涅槃心點出正法眼雖是當人本具覓他起處無蹤喝一喝云獅斤一奏群響絶聞即日雪消少室春滿皇州恭惟功德主太監公荷聖情於北闕明祖意於西齋內府良才法門外護建茲淨業堂於妙應集大比丘衆於叢林萬善同歸一期嘉會分六時之禮誦為三載之良規幸得我僧録講經信庵諒公大和尚宗通説通名稱德稱月三八日降此敷揚本山方丈昺公長老本山耆舊成公瑄公與夫堂中江湖龍象并內外檀越緇白人等輸誠樂助決非偶然是以謁我山僧肅臨此座焚一炷香上答皇猷助宣佛化因茲記得世尊與衆行次以手指地上云此處宜建梵剎天帝釋持一莖草插於地上云建梵剎已竟雖云塵中能作主化外自來賓殊不知世尊帝釋到這裏公案現成曾誰有作所以這些用處如走盤珠在在而圓旨絶詮量自不期然而然秪如我太監公換瓦礫作珠珍轉穢邦為淨土樹引七行寶殿階前枝布影蓮開九品金波池上水生香人人口吐古佛嘉名個個毛含遮那法界一塵一念互遍互融堪酬莫大之恩共入無生之智可謂紅爐點雪碧海挑燈一種也是建箇梵剎且太監公與天帝釋還有古今相隔也麼更聽垂偈信手拈來一莖草堂堂梵剎眼中新乾坤一色黃金界萬象咸彰劫外春拈古舉南泉歸宗麻谷禮拜忠國師泉於路上畫一圓相云道得即去宗於圓相中坐谷作女人拜泉云恁麼則不去也宗云是何心行拈云南泉與歸宗麻谷半路做個抽身計以為自勝然千説不如一見舉香嚴垂語云如人上樹口銜樹枝手不攀枝腳不踏枝下有人問西來意若不對違他所問若對又喪身失命正當恁麼時作麼生即是有虎頭招上座云樹上即不問未上樹請和尚道香嚴呵呵大笑拈云叢林謂之虎頭可謂虎頭者也然據虎頭收虎尾須是香嚴老作何也不見道樹上道即易舉雲居宏覺禪師僧問如何是沙門所重宏覺曰心識不到處拈云宏覺乃洞下尊宿恰不聞如馬之馵之説歟舉溈山五峰雲巖同侍立百丈大師云併卻咽喉唇吻作麼生道溈山云卻請和尚道丈云不辭向汝道恐已後喪我兒孫五峰云和尚也須併卻丈云無入處斫額望汝雲巖云和尚有也未丈云喪我兒孫拈云老百丈耄矣為子孫故忘於言而也不知舉城東老母與佛同時而生一生不願見佛一日及見佛來周回上下皆避不得乃以手掩面十指掌中悉皆見佛拈云城東老母不願見佛恰不知在己通身是佛殆見佛後又不能於無佛處藏身將謂這婆子有多少奇特舉陸亙大夫問南泉弟子家中有一片石有時坐有時臥欲鐫作佛得否泉云得陸云莫不得否泉云不得拈云陸大夫一片好石不遇南泉幾喪淳矣舉玄沙示衆云諸方盡道接物利生忽遇三種病人來如何接得患盲者拈槌豎拂他又不見患聾者語言三昧他又不聞患啞者教伊説又説不得若接此人不得佛法無靈驗拈云玄沙三種病人使盧扁再世也只可拱手況庸醫者乎舉德山示衆云今夜不答話問話者三十棒時有僧出禮拜山便打僧云某甲話也未問山云爾是甚處人僧云新羅人山云未踏船舷好與三十棒法眼拈云大小德山話作兩橛圓明道大小德山龍頭蛇尾雪竇云二老宿雖善裁長補短捨重從輕要見德山亦未可何故德山大似握閫外威權有當斷不斷不招其亂底劍諸人要識新羅僧麼只是撞著露柱底箇瞎漢拈云若是德山當時只説到今夜不答話處便住免見後來惹起這許多葛藤又云我是新羅僧見德山才開口呵呵一笑便出舉雲門示衆云老胡生下一手指天一手指地周行七步目顧四方云天上天下惟我獨尊當時若見一棒打殺與狗子喫卻貴圖天下太平拈云雲門雖是報恩有分苟當時有人則亦須喫棒所以往往瞻前多是不知顧後舉臺山路上有一婆子凡有僧問臺山路向什麼處去婆云驀直去僧才行婆云好箇阿師又恁麼去也僧舉似趙州州云待與勘過州亦如前問至來日上堂云我為汝勘破婆子了也拈云趙州勘婆話千百年下我聞恰如親見這老漢一般未知諸方作麼商量舉投子問巨榮禪客老僧未曾有一言半句挂諸方耳目何用要見山僧僧云到這裏不施三拜要且不甘子云出家兒得恁麼沒碑記僧繞禪床一匝而去子云有眼無耳朵六月火邊坐拈云這僧沒碑記何似投子沒碑記當時若見也放這老漢不過舉布袋和尚頌云彌勒真彌勒分身千百億時時示時人時人皆不識拈云時人且止布袋還自識麼舉睦州問武陵長老了即毛端吞巨海始知大地一微塵作麼生陵云和尚問誰州云問長老陵云何不領話州云我不領話你不領話拈云若是睦州待武陵云和尚問誰便爾休去豈不千好萬好卻云問長老噫不亦剩矣舉太原孚上座問鼓山父母未生時鼻孔在什麼處山云即今生也鼻孔在什麼處孚不肯乃云你問我與你答山云父母未生時鼻孔在什麼處孚乃搖扇而已拈云我是鼓山但向伊道扇子且從你搖切忌築著磕著舉雪峰云飯羅邊坐地餓死人無數海水邊坐地渴殺人無數玄沙云飯羅裏坐餓死人無數海水沒頭渴殺人無數雲門云通身是飯通身是水拈云老雪峰一門父子説飯説水自有意味我則不然不見道不貪香餌味須是碧潭龍舉趙州云老僧答話去也有解問底致將一問來時有僧出禮拜州云比來拋磚引玉卻引得箇墼子下座後法眼舉問覺鐵觜此意如何覺云與和尚舉箇喻如國家拜將相似問云誰人去得有一人云某去得答云汝去不得法眼云我會也拈云才見道老僧答話去也便與喝散大衆尚且不堪後來覺鐵觜法眼強説兵機嗚呼蹉過趙州遠矣舉法華經云止止不須説我法妙難思諸增上慢者聞必不敬信拈云長鯨一吸海水盡團團露出珊瑚枝舉崇壽指凳子云識得凳子周匝有餘雲門云識得凳子天地懸殊拈云識得凳子千株松下好坐歇涼舉梁武帝問達摩大師云如何是聖諦第一義大師云廓然無聖帝云對朕者誰大師云不識拈云作家君王幾被大師熱瞞一上因茲故直得少室冷雪光生舉白雲端禪師因郭功輔到示衆云夜來枕上作得箇山偈謝功輔大儒説與大衆請已後分明舉似諸方此偈非惟謝功輔大儒只要與天下有鼻孔衲僧脫卻著肉汗衫乃云上大人丘乙己化三千七十士爾小生八九子佳作仁可知禮也拈云此偈謝功輔大儒即得要脫他衲僧著肉汗衫則未可何也猶帶筆墨氣在舉保寧勇禪師示衆云大方無外大圓無內無外無內聖凡普會瓦礫生光須彌粉碎無量法門百千三昧拈拄杖云總向這裏會去蘇嚕蘇嚕㗭唎㗭唎娑婆訶拈云若是這老漢只説到無量法門百千三昧處便驀拈拄杖下座至今天下人不奈這老漢何舉如來大集會中一切諸大衆奉如來命皆發菩提心惟大力魔王云待一切衆生成佛盡衆生界空時我乃發菩提心拈云噫名下不虛人真可謂大力者也舉阿育王飯三十萬比丘衆賓頭盧尊者居上座王問尊者親見佛耶尊者以手舉眉毛視王曰我見於如來於世無譬類王又問何處見佛尊者曰如來將五百阿羅漢俱王舍城安居老僧亦在其中拈云惜乎賓頭盧將見佛一隻眼失卻了也若是育王見舉起眉毛便與踏倒飯床也且當得一時齋會卻又問何處見佛可謂相見不如初頌古舉世尊降生云云頌曰指天指地獨稱尊誰為銘肌共報恩莫道兒孫渾不肖也知末上有雲門舉梁武帝問達麼大師云云頌曰廓然無聖又不識長安大路如絃直得來謁君不得君翻成萬里關山隔一蘆江上去茫茫闔國人追追不及少林冷坐才九秋千古清風蕩八極舉僧問趙州如何是趙州州云東門西門南門北門頌曰直指東西南北門堂堂大道接天閽行人好去不歸去回首雲泥又夕昏舉道吾至一家吊慰漸源撫棺問生耶死耶吾云生也不道死也不道源云為甚麼不道吾云不道不道頌曰不道不道還不道泥牛夜吼海天寒若使其人聽得見方知雪曲和應難舉乾峰示衆云舉一不得舉二放過一著落在第二雲門出衆云昨日有人從天台來卻往徑山去峰明日不得普請便下座頌曰眼眼相看不見眼更於何處覓知音如今要識韶陽老南嶽天台沒路尋舉世尊與衆行次以手指地云此處宜建梵剎帝釋將一莖草插於地上云建梵剎已竟世尊微笑頌曰信手拈將一莖草青山滿目舊家邦怡然一笑不知處月在西林水半江舉茶陵郁和尚悟道偈云我有明珠一顆久被塵勞關鎖今朝塵盡光生照見山河萬朵頌曰斗笠騎驢過水西莓苔朝雨滑如泥不防一踏溪橋斷回首青山天際低舉雲門因齋次拈胡餅示衆云我這箇只供養江西兩浙人不供養向北人時有僧問為甚麼不供養向北人門云天寒日短兩人共一碗頌曰箇胡餅討甚汁雲門一衆皆充足向北人向北人為君別甑炊香粒咄天寒日短兩人一碗舉船子誠禪師囑夾山云直須藏身處沒蹤迹沒蹤迹處莫藏身吾三十年在藥山只明斯事頌曰三十年來明底事踏番水底一片天無蹤迹處無蹤迹誰説華亭有受傳舉定上座問臨濟如何是佛法大意濟下禪床擒住與一掌便托開定佇立傍僧云定上座何不禮拜定方禮拜忽然大悟頌曰下床一掌托開去大用全機如掣電當下不容佇思間直教萬疊雲山斷舉僧問夾山如何是夾山境山云猿抱子歸青嶂後鳥銜花落碧巖前法眼拈云老僧二十年只作境會頌曰秋林風掃凋霜葉曉嶂雲穿落澗泉二十年來花下路不知遊遍洞中天舉僧問琅琊覺和尚云清淨本然云何忽生山河大地覺云清淨本然云何忽生山河大地頌曰清淨本然是何物山河大地是何物江漢一霜天地秋籬邊開遍黃金菊須恁麼勿輕忽六六元來三十六舉石頭示衆云言語動用沒交涉藥山云非言語動用亦沒交涉頭云我這裏針劄不入山云我這裏石上栽花頌曰石女解吹無孔笛木人能鼓沒絃琴石頭路滑非君到千古誰傳此段音舉世尊臘月八日明星出時忽曰奇哉一切衆生具有如來智慧德相但以妄想執著不能證得頌曰須彌橫海露全身沒奈衆生眼有塵忽見明星當五夜雪深寒谷變陽春舉僧問寶壽萬境來侵時如何壽云莫管他僧禮拜壽云莫動著動著打折你驢腰頌曰萬境來侵總不干呼蛇容易遣蛇難當時不得驅耕手爭現全身百尺竿舉雲門問僧云光明寂照遍河沙豈不是張拙秀才語僧云是門云話墮也頌曰光明寂照遍河沙何事無端舉似他眨眼不知何處去遠山無限落晴霞舉張拙秀才問長沙岑大師曰三千諸佛但聞其名未審居何國土還化物也未沙云黃鶴樓崔皓題詩後秀才曾題麼拙云不曾沙云得間題取一編也好頌曰詩家千載羡崔君黃鶴樓高飛白雲為恨長沙好知識如何還似不聞聞舉兜率悅禪師三關云撥草瞻風直圖見性且道性在甚麼處頌曰東西南北人間天上滿目青山一條拄杖云既得見性便脫生死四大分離作麼生脫頌曰四大分離與君訣別兔角杖頭挑潭底月云既脫生死便知去處眼光落地向甚麼處去頌曰元來鼻孔沒有半邊覓伊去處徒費鞋錢囑大宗宣禪人一陳兩陳秋風生千里萬里秋空碧體露堂堂無位人從來共住不相識囑月潭清禪人問答時有此語成偈付之佛祖位中留不住卻行異類且輪回放伊三十婆心切芳草溪邊任去來囑曉堂明禪人傳他佛祖不傳燈須是叢林一箇僧倘有未知歸路客要伊指出火中冰囑普門智禪人百草頭邊真祖意持來默默相分付法門重任自當知未可於人輕吐露囑海藏深禪人臨濟當年第一機只傳活棒不傳衣果然做得他家子喝下承當也是遲行腳師一日謂衆曰淨倫滇南昆明康氏父泰母何氏生子四倫居末生宣德丁未正統丁巳年甫十一入學庚申是年十四出家受業本府太華無極泰和尚戊辰春年二十一因請給遂謁大方究明大事天順癸未臘末參見古庭老和尚於浮山是年已三十七矣自戊辰及癸未十六七年間江南江北經寒經暑話頭上册子裏掠得些子古人汗臭氣逮見老和尚總不當得成化乙酉秋九月別浮山丁亥三月京開山萬福遂自領衆戊戌夏謝院事間居癸卯春之五臺挂錫顯通約有年餘常與數輩禪流者朝夕論其本有丙午京中飯僧弘治庚戌秋赴顯通請淨業堂撫衆壬子夏是年六十有六即京之舊隱俟其終身然幻迹去在又未必其何如於戲人之有生為難棲身方服之下更是為難古云衣線下未明大事誠為苦也可不勉哉可不勉哉因姑述此以冀吾徒參學者慎勿我效焉七言律次喬武庫縉金山勝覽韻妙高臺上昔年遊想遍山中景物幽出洞白雲含海曙映窗晴雪湛江流好音常聽樹頭鳥相對不飛沙際鷗西望金陵千古意蔥蔥佳氣帝王州洞口間雲淡不飛亭高真與世途違青山緑樹環千里霽月晴嵐滿四圍定裏閣愁簾影靜講餘窗午磬聲微一回獨倚闌干外天水分陰半落暉次韻送太常卿任先生坦然歸田留別參差泉石舊巖廬千里攜歸一篋書松露滴苔三徑滑茶煙凝竹六窗虛非心行處同誰到即色空時可自居溢目青山雖熟路半途爭肯息肩輿明月清風信有緣衣冠歸去洞中仙黃茅恰好三間屋白粥尋常數畝田道在目前全是理心先物外亦循天未知此事同誰得高枕青山日打眠新春日閲華嚴經有作次韻帝網重重演妙嚴我生何幸且粗諳耳聲眼色皆同入塵佛毛區等會談不異不同還不一非前非後亦非三百城煙水春風裏物物頭頭盡指南擬濟川航僧録早春望湖亭林煙隔孤村叫午雞登臨人立小亭西雪崖日暖飛空翠泉谷風寒吐白霓原上燒痕初得雨隄邊新柳未拖泥茫茫湖水渺天際無限青山眼外低送清泉洪首座南歸來往京華究上乘挑雲聊荷一枝藤草鞋踏遍千巖雪古路曾逢幾個僧秋水拖藍寒瀲灩晚山削碧瘦稜層叢林有則舊公案誰肯拈將繼祖燈秋早過盧溝雞鳴茅店過盧溝灘急桑乾淺水流霜冷斗牛低北漢風清山月下西樓金鞭策馬人行早竹杖挑雲我自由一望柳堤三十里蒼涼紅日上瀛州憶受業太華次韻故國太華峰頂寺我年十五始初登月邊幽唳青松鶴雲外高眠白晝僧到岸舟橫流水曲尋溪路入落花藤昨宵因憶石窗下曾也尋經分夜燈城市山林擬天目和尚作長安車馬日縱橫中有幽棲何許清種竹護煙林下趣開池來月水邊情門間自與紅塵遠路滑誰嫌緑蘚生住處樂然貧道者從他人世不知名銀山僧院松棚小院寥寥半畝寬老松傍石壓簷盤一窗風度夜聲碎滿地月窺秋影寒鐵幹低扶青雨蓋虯枝細織碧雲團山僧白日森陰下無限塵緣了不干龍泉山行癸卯入臺山有作路入龍泉逸興悠春風千里片雲浮遠青近碧山無數東曲西彎水自流幾個人家花發處一聲啼鳥樹高頭誰知未過松關外已在清涼地上遊投宿迷解寺次壁間韻杖錫飄飄五頂遊去心不管鬢毛秋半竿落日孤城遠千里分沙一水流清夜做回天上夢白雲攔斷世間憂草鞋明早溪橋外疊疊青山任自由次顯通署菴僧録淨業堂詩韻白業精修預者稀一堂風淡景凄凄燈懸宴坐一肩並粥罷經行千指齊天樂響時知去路藕花香處定歸西這回得見黃金父誓遍塵區指導迷遠繼前賢高躅稀蓮花漏刻畫凄凄幸同持遠千年事當與劉雷一輩齊晴疊青山金沼上冷懸紅日畫樓西即時踏著還鄉路越死超生更不迷幾年禪悅費多吟雞叫前村月半林清磬一聲千嶂曉白雲數點萬山深盡將南閣題詩夢都作西樓念佛心白髮願求歸去日滿天飄下雨花陰十方佛讚古彌陀舌覆三千見也麼片雪爐中觀淨土漚花影裏度娑婆比於兔角長些子卻較龜毛短不多星月夜深垂斗柄眉間毫相照山河五峰廓爾一精藍古鷲巖前著小菴撈月有時空自笑觀心無處共誰諳雨中山色長年露天外松風盡日談睡起倚窗間看雪尋梅未必到江南過暘白谷靈峰寺次韻青鞋布襪過南溪小嶺崎嶇似躡梯石咽泉聲能斷續雲連山色自高低樹頭落子偷松鼠崖畔飛霜叫竹雞一飯靈峰秋日短杖黎回首野橋西送友人求進未遂之南回雞叫霜林夢未醒如何滿得世間情雲橫天際暮山遠潮落江頭秋水平千里去程勞跋涉幾人回首笑功名為憐空劫已前事又著聰明背一生五言律成都喻監生存性西莊西山夕照好山千萬疊高倚碧樓西橫谷生雲淡隔林歸鳥啼窗開秋景霽簾捲夕陽低遠接岷峨色嘉名入品題葛仙聳翠山中有仙迹千載亦悠悠黃鶴一飛去落花間自流琴空雲洞古劍化石潭秋路入青蒼裏煙霞不盡頭古柏參天庭堂清畫永古柏上參天挺挺一千尺遲遲五百年霜皮堆緑蘚鐵幹繡寒煙曾説丘墟變高摽只迥然銀山白銀峰景仰白銀峰層臺隔幾重半天晴削出千丈碧芙蓉猿叫洞門月鶴盤雲外松倚窗僧笑指高處有靈蹤古佛巖蒼松盤古巖下有白雲屋仙梵隔煙霞洞門鎖幽谷忽逢掃業僧不見銜花鹿來此禮空王苔碑再三讀説法臺偶來松下坐苔護石臺平谷口山泉響林梢花雨晴此時誰説聽千古意分明回首日將夕雲堂鐘磬鳴東林別意寄太初元上人向作東林別年華白我頭此情無共語斯道不堪憂簾卷禪房晝月高經閣秋五臺山色裏還似夢曾遊竹室自適披衣終日坐惟道可為憑蒼雪千竿竹白頭一個僧雨苔迷石徑山氣冷龕燈門外幾多事生來都不能南山訪友訪友過南山悠悠翠靄間松皮山舍小石子野溪彎丘止鳥飛倦洞藏雲自間紛紛身外事誰不厭躋攀與聰元二上人過南山睹其人境俱秀雲鶴同間遂次前韻聯句筆之于壁以紀一時之興云策杖上南山倫千峰指顧間聰池開天鏡小元簾挂月鉤彎僧與山同瘦倫鶴隨雲共間聰優遊清絶處倫乘興一躋攀七言絶清涼山詠雪高五髻爛堆銀迥比人間境界新山外好山千萬疊不來空老夢中身清涼頂白雲藏盡千峰碧微露摩空五頂圓高步清風生足下不知身在幾重天清涼洞松風流入洞門深策杖優遊我一尋回首祕魔巖上雨暮雲歸去碧潭陰遊祕魔巖道得不得杈下死絶無參客到蘿門至今巖畔松風冷吹著行人也斷魂遊廬山尋竹林迹山色晴開一徑深落花流水入春陰不知坐石看雲處遊遍無門聖竹林進庵竿頭一步要親登不枉江湖做個僧更會轉身一步子歸家合掌見南能德雲間間一片太空中忽爾興騰事不同普使大千霑一雨歸來不住妙高峰別峰聞言不與衆山同知在煙霞第幾重一到德雲高步處至今終不更迷宗曙庵月落潭空夜色濃穿雲誰伴下危峰歸來趺坐不知曉窗外日高松影重無敵一片當年鐵石心龍蛇陳上慣能臨于今勳業渾忘卻高臥白雲深處深臥雲我愛青山全是道青山與我亦忘年日長無事青山裏高枕煙霞只打眠雲菴一片兩片晴不飛三日五日茅簷宿悠悠常伴道人間謾作甘霖出巖谷山居雜吟道人活計任天成山自高弓水自平一榻樹陰眠白日不知身似一毛輕我與青山信有緣青山與我更相便源頭活水松頭月此道無時不見前自入青山世路遙煙霞養得性情高幾回日轉松陰去安枕柴床睡正牢野性生來愛住山住來住去自空間秋霜冬雪不知老瘦鶴枯松碧嶂間喜禽飛到立庭柯枝動身輕語更多無限風情冬日暖底須説似老頭陀示鬱上人少年清質出家兒大事須明及早時不做一番窮的的何能容易樂無為示滇南洪上人忙忙走得草鞋穿只為無端要學禪踏破滇池波底月元來佛祖不曾傳寄廣道者為僧未得個心明自是參禪正念輕寄語上人當自勉莫交此度又虛生示徒英侍者我苦旃檀樹色秋吾兒何不也添愁出家若不修僧行誰料番為佛祖讎示增上人唯有死生真大事其餘都是可商量此生若不分明了何劫方歸本分鄉送傑峰昂長老下山一句彌陀記得牢自然傑出五峰高丁寧再四不依説辜負眉間白玉毫送僧淨僧髮一枝佛祖未傳燈枯木巖前夜發明不向個中知瞥地纍他無事半千僧五言絶句浮山別意天光寫秋碧林葉脫秋黃片帆雲外去歸興與秋長九月逸興清清秋風吹泠泠秋露垂伊誰同晚節黃菊發東籬白水池阻雪寄中巖昨朝春雨多今日山堆雪拄杖欲尋師雲深去不得采藥雲深洞口流來水溪邊帶出花偶因尋藥物不覺入煙霞晝寐野禽聲隔樹幽草碧侵簾身外無他事藤床午睡甜松陰小憩風來石上松僧坐松下石洗鉢將煮茶溪流漾晴碧盆石菖蒲為蘄州姚揮使題雲根漱碧泉劍氣涵秋冷移近讀書窗燈夜分清影沈周墨芭蕉晴空開雪景寒緑到欄干寫透幾千葉淋漓墨未乾七言古碧雞山雙月塔為義明二上人題塔目何緣題作雙月名道人高行堪將評虛懷彼彼冰霜清小朗大朗為弟兄三十青黃節不更只觀百歲如長庚日常一鉢和羅羹庵前誰把春風耕有時對月陶幽情有時坐石談無生此身不啻一點晴雲輕身外何事能營營虛空無縫藏枯形卻把雲根苦鑿成巖壑含虛兩鏡明海天寫影雙珠擎碧雞午夜空山鳴溪頭眠雪泥牛驚肯似南陽一默話頭行千古萬古遺嘉聲萬玉飄香墨梅為聰慧菴題溪上同雲壓地黑遙空亂亂飄瓊屑玉龍何處蟠祗園煙徑水濱尋不得緑衣仙子羅浮來芳心細把輕冰裁天風吹徹素屏曉不知滿樹梅花開吟魂自覺有如許千朵萬朵凝寒蕊翠羽不啼林影橫黃昏似向低低語竹爐靜煮茶索笑山僧家臞肌淡煙掃忘卻歸蓬島上人坐倚蒲團青硯池凍冾空冥冥暗香冷襲清夢去寂寂柴門晝不扃昨夜西湖峰頂月來我窗前吐虛白試問江南多少春都在僧房散在枝頭雪
