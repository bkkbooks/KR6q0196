front:
  text: 大巍禪師竹室集序必有非常之智識而后能具非常之眼力必有非常之根器而后能任非常之事業必有非常之造就而后能立非常之格言是固鍾一方山川之間氣為一代人物之英豪展一生問學之底蘊作一教人天之眼目其氣清其鑒明其力勇其行決其得真故其發於言也得古人不傳之旨擴古人未發之蘊而足以為後人之公案之指歸之梯航者吾於大巍禪師所著竹室集見之矣師名淨倫號大巍本滇南昆明康氏父諱泰母何氏宣德丁未誕生師幼即超卓不凡正統庚申出家禮太華無極泰和尚受禪學天順癸未得法於浮山古庭和尚為臨濟下草四世孫蒲團工夫及盡玄旨成化乙酉卓錫都城東隅開創萬福禪剎宗風大著緇白來者逮無虛日師本好寂靜歲久厭於酬應至戊戌遂謝事退居西軒種竹自怡號曰竹室偃息於中癸卯登五臺訪文殊師利聖跡丙午歸飯僧米麥之需遠近輻輳不假勸募弘治庚戌復遊五臺蓋顯通寺旺覺義敦請撫衆修淨業也壬子復歸竹室閲大藏經典師不但為宗門山斗而又旁通儒學所著上堂示衆拈古頌古與夫賡酬獨唱之作士林君子見之莫不起敬起慕其徒道宗道義二上人恐其久而失遺相與掇拾成帙名曰竹室集鋟梓欲傳然尚亦有失拾者多謂余與師有方外契持以過余請序首簡余授而展玩至再雖未究其精義然觀其間亦有吻合於吾儒者不能無所感焉其曰百城煙水不出一毛十世古今匪移當念豈非吾儒一貫之體用動靜乎其曰如是孜孜不捨生死坐臥與之根定行到用力不得處忽然大悟橫豎左右得大受用天真明妙圓湛虛活拈來用去不期而然初無容心於其間又非吾儒之深造自得居安資深左右逢原者乎至若豎拂子以示色擊卓子以示聲與夫絶照篇云未若打破鏡撲滅燈來與汝相見看是甚麼面孔又豈非吾儒之德輶如毛毛猶有倫上天之載無聲無臭之旨乎其餘吟詠雖皆時應物而發然理致之言混然天成機杼自別非升堂入室者未易窺其端際吾何能贊一辭邪由是有以見其鑒之明行之力得之真故於繼往開來有不得辭其任者矣由是有以見其鍾滇雲之秀氣闡象教之幽微延禪宗之命脈故於提撕警覺有不得已於言者矣由是有以見其大智識大根器得最上一乘造就故能具大方之眼力成無為之事業立方便之格言雖不待傳而自不容於不傳者矣閲是集者苟能因言會意於一話頭反覆玩味忽爾築著磕著偶一覺悟從而入之脫脫灑灑圓圓陀陀得大自在則所謂世界中心西來祖意無縫塔鹽官鼓悉在個中矣否則業識茫茫甘受輪轉雖古佛與居不能化而入矣尚何怪其有宗門寂寞之嘆也哉然則師自謂其言如虛空鳥跡而吾又復為之序寧不剩矣哉要知筌本在魚得魚斯忘筌矣蹄本在兔得兔斯忘蹄矣言本在意得意斯忘言矣噫安得夫忘言之人而與之同言哉因其請書以塞白云弘治九年歲次丙辰夏六月望賜進士第奉政大夫修正庶尹光祿寺少卿致仕李紳縉卿拜首序
